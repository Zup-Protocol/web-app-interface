<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="description"
      content="Zup Protocol - Find & Deposit Liquidity in a minute"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="theme-color" content="" id="theme-color-meta" />
    <title>Zup Protocol</title>

    <script type="module">
      import { ThemeMode } from "/src/lib/theme-mode.ts";
      import { LocalStorageKey } from "/src/lib/local-storage-key.ts";
      import {
        AppLanguages,
        AppLanguagesUtils,
      } from "/src/lib/app-languages.ts";

      const supportedLanguages = AppLanguagesUtils.values.filter(
        (v) => v !== AppLanguages.SYSTEM,
      );

      (function () {
        function getTheme() {
          if (
            typeof localStorage !== "undefined" &&
            localStorage.getItem(LocalStorageKey.THEME)
          ) {
            return localStorage.getItem(LocalStorageKey.THEME);
          }
          return ThemeMode.SYSTEM;
        }

        function setClass(theme) {
          const isDark =
            theme === ThemeMode.DARK ||
            (theme === ThemeMode.SYSTEM &&
              window.matchMedia("(prefers-color-scheme: dark)").matches);

          if (isDark) {
            document.documentElement.classList.add(ThemeMode.DARK);
          } else {
            document.documentElement.classList.remove(ThemeMode.DARK);
          }

          updateMeta();
        }

        function updateMeta() {
          const meta = document.getElementById("theme-color-meta");

          if (meta) {
            const background = getComputedStyle(document.documentElement)
              .getPropertyValue("--background")
              .trim();
            if (background) {
              meta.setAttribute("content", background);
            }
          }
        }

        const theme = getTheme();
        setClass(theme);

        const observer = new MutationObserver(() => {
          updateMeta();
        });

        observer.observe(document.documentElement, {
          attributes: true,
          attributeFilter: ["class"],
        });

        window
          .matchMedia("(prefers-color-scheme: dark)")
          .addEventListener("change", () => {
            if (getTheme() === ThemeMode.SYSTEM) setClass(ThemeMode.SYSTEM);
          });
      })();

      (function () {
        function getInitialLocale() {
          const stored =
            typeof localStorage !== "undefined"
              ? localStorage.getItem(LocalStorageKey.LOCALE)
              : null;
          if (stored) return stored;

          if (typeof navigator !== "undefined") {
            const sys = navigator.language.split("-")[0];
            if (supportedLanguages.includes(sys)) return sys;
          }
          return AppLanguages.ENGLISH;
        }

        const locale = getInitialLocale();
        document.documentElement.lang = locale;
      })();
    </script>
  </head>
  <body
    class="bg-background text-foreground antialiased selection:bg-primary selection:text-primary-foreground min-h-screen"
  >
    <div id="root"></div>
    <script type="module" src="/src/client.tsx"></script>
  </body>
</html>
